<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0A0A0B"/>
<title>FF Scout — by @Raj_op_360</title>
<style>
:root{
  --bg:#0A0A0B;--bg2:#111113;--surface:#1C1C1E;--elevated:#2C2C2E;--card:#18181B;
  --sep:rgba(255,255,255,0.07);--sep2:rgba(255,255,255,0.12);--sep3:rgba(255,255,255,0.05);
  --fire:#FF4500;--fire2:#FF6A00;--ember:#FF9500;--gold:#FFD60A;--amber:#FFAA00;
  --text:#F5F5F7;--t2:rgba(245,245,247,0.65);--t3:rgba(245,245,247,0.38);--t4:rgba(245,245,247,0.18);
  --green:#30D158;--red:#FF453A;--blue:#0A84FF;--teal:#5AC8FA;--purple:#BF5AF2;--indigo:#5E5CE6;
  --r-2xl:24px;--r-xl:20px;--r-lg:16px;--r-md:12px;--r-sm:8px;--r-pill:999px;
  --fn:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",system-ui,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.4),0 8px 24px rgba(0,0,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fn);min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;padding-bottom:max(40px,env(safe-area-inset-bottom))}

/* ══ GLOW ══ */
body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);
  width:700px;height:500px;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at top,rgba(255,106,0,0.09) 0%,transparent 65%);}

/* ══ ISLAND ══ */
.island-wrap{position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;justify-content:center;padding-top:11px;pointer-events:none;}
.island{background:#000000;border-radius:var(--r-pill);padding:9px 16px 9px 14px;
  display:flex;align-items:center;gap:0;pointer-events:all;min-width:210px;max-width:92vw;
  box-shadow:0 2px 30px rgba(0,0,0,0.95),0 0 0 0.5px rgba(255,255,255,0.08);
  transition:all 0.4s cubic-bezier(0.34,1.3,0.64,1);}
.isl-left{display:flex;align-items:center;gap:8px;}
.isl-flame{font-size:14px;animation:ifl 2.5s ease-in-out infinite alternate;}
@keyframes ifl{0%{transform:scale(1) rotate(-2deg)}100%{transform:scale(1.2) rotate(2deg)}}
.isl-brand{font-size:13px;font-weight:700;letter-spacing:0.2px;color:#fff;}
.isl-sep{width:1px;height:16px;background:rgba(255,255,255,0.12);margin:0 10px;}
.isl-dot{width:6px;height:6px;border-radius:50%;background:var(--fire2);
  box-shadow:0 0 6px var(--fire2);animation:ipulse 2s ease infinite;flex-shrink:0;}
@keyframes ipulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.isl-right{margin-left:auto;text-align:right;padding-left:12px;}
.isl-time{font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);
  font-variant-numeric:tabular-nums;letter-spacing:-0.3px;line-height:1;}
.isl-date{font-size:10px;color:rgba(255,255,255,0.38);margin-top:2px;letter-spacing:0.2px;}

/* ══ LANG ══ */
.lang-btn{position:fixed;top:14px;right:14px;z-index:1001;background:var(--elevated);
  border:1px solid var(--sep2);border-radius:var(--r-pill);padding:5px 12px;
  font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;
  font-family:var(--fn);transition:all .2s;letter-spacing:0.3px;}
.lang-btn:hover{color:var(--text);border-color:rgba(255,106,0,0.4);}

/* ══ PAGE ══ */
.page{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:82px 14px 32px;}

/* ══ HERO ══ */
.hero{text-align:center;padding:4px 0 26px;}
.hero-eye{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--fire2);margin-bottom:10px;opacity:0.9;}
.hero-title{font-size:clamp(30px,8vw,40px);font-weight:800;letter-spacing:-1.5px;
  line-height:1.05;margin-bottom:8px;}
.grad{background:linear-gradient(125deg,#FF4500 0%,#FF6A00 30%,#FF9500 60%,#FFD60A 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:13px;color:var(--t2);line-height:1.6;font-weight:400;}

/* ══ SEARCH ══ */
.sbox{background:var(--surface);border-radius:var(--r-xl);padding:14px;
  margin-bottom:10px;border:1px solid var(--sep);
  transition:border-color .3s,box-shadow .3s;}
.sbox:focus-within{border-color:rgba(255,106,0,0.35);
  box-shadow:0 0 0 3px rgba(255,106,0,0.07);}
.seg-wrap{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r-md);
  padding:3px;margin-bottom:12px;}
.seg{flex:1;padding:7px;border:none;border-radius:10px;
  font-size:12px;font-weight:600;color:var(--t3);background:transparent;
  cursor:pointer;font-family:var(--fn);transition:all .2s;letter-spacing:0.2px;}
.seg.on{background:var(--elevated);color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.6),0 0 0 0.5px rgba(255,255,255,0.06);}
.irow{display:flex;gap:8px;}
.sinput{flex:1;background:var(--bg2);border:1px solid var(--sep2);
  border-radius:var(--r-md);padding:12px 14px;color:var(--text);
  font-size:15px;font-family:var(--fn);outline:none;-webkit-appearance:none;
  transition:border-color .2s;caret-color:var(--fire2);}
.sinput::placeholder{color:var(--t3);}
.sinput:focus{border-color:rgba(255,106,0,0.45);}
.sbtn{background:linear-gradient(145deg,var(--fire),var(--fire2));
  border:none;border-radius:var(--r-md);width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
  transition:opacity .2s,transform .12s;
  box-shadow:0 4px 14px rgba(255,69,0,0.35),0 1px 3px rgba(255,69,0,0.2);}
.sbtn:hover{opacity:.88}.sbtn:active{transform:scale(.93)}
.sbtn:disabled{opacity:.4;cursor:not-allowed}
.sbtn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;
  stroke-linecap:round;stroke-linejoin:round;}

/* ══ LOADER ══ */
.loader{display:none;flex-direction:column;align-items:center;gap:16px;padding:64px 0;}
.lring{width:38px;height:38px;border-radius:50%;
  border:2.5px solid var(--elevated);border-top-color:var(--fire2);
  animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--t3);font-weight:400;}

/* ══ ERROR ══ */
.ebox{display:none;background:rgba(255,69,58,0.07);
  border:1px solid rgba(255,69,58,0.18);border-radius:var(--r-lg);
  padding:13px 16px;font-size:13px;color:var(--red);line-height:1.5;margin-top:4px;}

/* ══ OUTPUT ══ */
#out{display:flex;flex-direction:column;gap:10px;margin-top:4px;}

/* ══ SECTION LABEL ══ */
.slbl{font-size:11px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:1.3px;padding:0 2px;
  margin-bottom:-2px;margin-top:6px;}

/* ══ CARD ══ */
.card{background:var(--surface);border-radius:var(--r-xl);
  overflow:hidden;border:1px solid var(--sep);box-shadow:var(--shadow);}

/* ══ PROFILE HERO ══ */
.banner-img{width:100%;display:block;aspect-ratio:21/6;object-fit:cover;
  background:var(--bg2);border-bottom:1px solid var(--sep3);}
.prow{padding:13px 14px 14px;display:flex;gap:12px;align-items:flex-start;}
.avawrap{position:relative;flex-shrink:0;margin-top:-26px;}
.ava{width:64px;height:64px;border-radius:19px;
  border:3px solid var(--surface);background:var(--bg2);
  object-fit:cover;display:block;}
.ava-ph{width:64px;height:64px;border-radius:19px;border:3px solid var(--surface);
  background:rgba(255,69,0,0.1);display:flex;align-items:center;justify-content:center;font-size:26px;}
.online{position:absolute;bottom:1px;right:1px;width:13px;height:13px;
  border-radius:50%;background:var(--green);border:2.5px solid var(--surface);
  box-shadow:0 0 5px var(--green);}
.pcol{flex:1;min-width:0;}
.pname{font-size:19px;font-weight:800;letter-spacing:-0.4px;line-height:1.2;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.puid{font-size:11px;color:var(--t3);font-family:ui-monospace,monospace;
  margin-top:3px;letter-spacing:0.2px;}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}

/* ══ TAGS ══ */
.tag{padding:3px 9px;border-radius:var(--r-pill);font-size:11px;
  font-weight:600;letter-spacing:0.2px;white-space:nowrap;}
.tf{background:rgba(255,106,0,0.14);color:var(--ember);border:1px solid rgba(255,106,0,0.24);}
.tg{background:rgba(255,214,10,0.1);color:var(--gold);border:1px solid rgba(255,214,10,0.18);}
.tgr{background:rgba(48,209,88,0.09);color:var(--green);border:1px solid rgba(48,209,88,0.16);}
.tb{background:rgba(10,132,255,0.1);color:var(--blue);border:1px solid rgba(10,132,255,0.18);}
.tt{background:rgba(90,200,250,0.08);color:var(--teal);border:1px solid rgba(90,200,250,0.15);}
.tp{background:rgba(191,90,242,0.09);color:var(--purple);border:1px solid rgba(191,90,242,0.16);}
.tr{background:rgba(255,69,58,0.09);color:var(--red);border:1px solid rgba(255,69,58,0.16);}

/* ══ STAT STRIP ══ */
.sstrip{display:grid;border-top:1px solid var(--sep);background:var(--bg2);}
.s2{grid-template-columns:repeat(2,1fr)}.s3{grid-template-columns:repeat(3,1fr)}.s4{grid-template-columns:repeat(4,1fr)}
.si{padding:12px 8px;text-align:center;border-right:1px solid var(--sep);}
.si:last-child{border-right:none}
.sv{font-size:15px;font-weight:700;letter-spacing:-0.2px;
  background:linear-gradient(135deg,var(--fire2),var(--ember));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:0.9px;margin-top:3px;}

/* ══ CARD SECTION HEADER ══ */
.ch{padding:12px 14px 4px;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--t3);border-top:1px solid var(--sep);}
.ch:first-child{border-top:none}

/* ══ INFO ROWS ══ */
.il{padding:0;}
.ir{display:flex;align-items:flex-start;padding:11px 14px;
  border-bottom:1px solid var(--sep3);gap:10px;min-height:44px;}
.ir:last-child{border-bottom:none}
.ico{font-size:14px;width:22px;text-align:center;flex-shrink:0;margin-top:1px;line-height:1;}
.ik{font-size:13px;color:var(--t2);flex:1;line-height:1.4;padding-top:1px;}
.iv{font-size:13px;font-weight:500;color:var(--text);text-align:right;
  max-width:56%;word-break:break-word;line-height:1.4;}
.iv.mono{font-family:ui-monospace,monospace;font-size:11.5px;}
.iv.grn{color:var(--green)}.iv.red{color:var(--red)}.iv.gold{color:var(--gold);}
.iv.blu{color:var(--blue)}.iv.teal{color:var(--teal)}.iv.pur{color:var(--purple);}
.iv.amb{color:var(--amber)}

/* ══ IMAGE ══ */
.imgf{margin:8px 12px 12px;border-radius:var(--r-lg);overflow:hidden;
  background:var(--bg2);border:1px solid var(--sep);}
.imgf img{width:100%;display:block;object-fit:contain;background:var(--bg2);}
.imgf.banner img{max-height:150px;object-fit:cover;}
.imgf.outfit img{max-height:200px;}
.img-err{min-height:72px;display:flex;align-items:center;
  justify-content:center;color:var(--t3);font-size:12px;}

/* ══ ITEM GRID (wishlist + equipped items) ══ */
.igrid{padding:10px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:7px;}
.iitem{background:var(--bg2);border:1px solid var(--sep2);
  border-radius:var(--r-md);overflow:hidden;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  transition:opacity .2s;cursor:default;}
.iitem:hover{opacity:.75}
.iimg{width:100%;aspect-ratio:1;object-fit:contain;
  background:var(--elevated);display:block;padding:6px;}
.iph{width:100%;aspect-ratio:1;background:var(--elevated);
  display:flex;align-items:center;justify-content:center;font-size:22px;}
.iname{font-size:9.5px;color:var(--t2);padding:4px 5px;line-height:1.3;}
.iid{font-size:8.5px;color:var(--t3);font-family:monospace;padding:0 5px 4px;}

/* Rarity colors */
.rare-WHITE .iimg,.rare-WHITE .iph{background:rgba(255,255,255,0.04);}
.rare-BLUE .iimg,.rare-BLUE .iph{background:rgba(10,132,255,0.08);}
.rare-PURPLE .iimg,.rare-PURPLE .iph{background:rgba(191,90,242,0.08);}
.rare-ORANGE .iimg,.rare-ORANGE .iph{background:rgba(255,106,0,0.1);}
.rare-RED .iimg,.rare-RED .iph{background:rgba(255,69,0,0.1);}
.rare-GOLD .iimg,.rare-GOLD .iph{background:rgba(255,214,10,0.08);}

/* ══ BAN ══ */
.banw{padding:18px 14px;display:flex;gap:13px;align-items:center;}
.banic{width:48px;height:48px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.banic.safe{background:rgba(48,209,88,0.1);}
.banic.bad{background:rgba(255,69,58,0.1);}
.bantitle{font-size:16px;font-weight:700;letter-spacing:-0.2px;}
.bansub{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.4;}

/* ══ CREDITS ══ */
.credits{margin-top:28px;}
.ccard{background:var(--surface);border-radius:var(--r-xl);
  border:1px solid var(--sep);padding:18px 14px;text-align:center;}
.capp{font-size:18px;font-weight:800;letter-spacing:-0.4px;
  background:linear-gradient(120deg,var(--fire2),var(--ember),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;margin-bottom:3px;}
.cver{font-size:11px;color:var(--t3);margin-bottom:14px;}
.csep{height:1px;background:var(--sep);margin:10px 0;}
.crow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.clbl{font-size:12px;color:var(--t3);}
.cname{font-size:13px;font-weight:600;
  background:linear-gradient(90deg,var(--fire2),var(--ember));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cmade{margin-top:12px;font-size:11px;color:var(--t3);line-height:1.7;text-align:center;}

/* ══ EMPTY ══ */
.empty-msg{padding:24px;text-align:center;color:var(--t3);font-size:13px;}

/* ══ RANK BADGE ══ */
.rank-badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:var(--r-pill);font-size:11px;font-weight:600;}
.rb-heroic{background:rgba(255,214,10,0.12);color:var(--gold);border:1px solid rgba(255,214,10,0.2);}
.rb-diamond{background:rgba(10,132,255,0.12);color:var(--blue);border:1px solid rgba(10,132,255,0.2);}
.rb-plat{background:rgba(90,200,250,0.1);color:var(--teal);border:1px solid rgba(90,200,250,0.18);}
.rb-gold{background:rgba(255,106,0,0.1);color:var(--ember);border:1px solid rgba(255,106,0,0.18);}
.rb-silver{background:rgba(245,245,247,0.08);color:var(--t2);border:1px solid var(--sep2);}
</style>
</head>
<body>

<!-- Dynamic Island -->
<div class="island-wrap">
  <div class="island">
    <div class="isl-left">
      <span class="isl-flame">🔥</span>
      <span class="isl-brand">FF Scout</span>
    </div>
    <div class="isl-sep"></div>
    <div class="isl-dot"></div>
    <div class="isl-right">
      <div class="isl-time" id="iT">--:--:--</div>
      <div class="isl-date" id="iD">---</div>
    </div>
  </div>
</div>

<button class="lang-btn" id="lbtn" onclick="toggleLang()">हिंदी</button>

<div class="page">
  <div class="hero">
    <div class="hero-eye" id="h-eye">FreeFire Intelligence</div>
    <div class="hero-title">Scout any<br/><span class="grad">FF Player</span></div>
    <p class="hero-sub" id="h-sub">Full profile · All items · Rank · Guild · Ban</p>
  </div>

  <div class="sbox">
    <div class="seg-wrap">
      <button class="seg on" id="su" onclick="setMode('uid')">🔢 By UID</button>
      <button class="seg" id="sn" onclick="setMode('name')">🔤 By Name</button>
    </div>
    <div class="irow">
      <input class="sinput" id="q" type="text" placeholder="Enter FreeFire UID…"
        inputmode="text" autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')go()"/>
      <button class="sbtn" id="gb" onclick="go()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <div class="ebox" id="eb"></div>
  <div class="loader" id="ld"><div class="lring"></div><p class="ltxt" id="ltxt">Searching…</p></div>
  <div id="out"></div>

  <div class="credits">
    <div class="ccard">
      <div class="capp">🔥 FF Scout</div>
      <div class="cver">v4.0 · FreeFire Player Intelligence</div>
      <div class="csep"></div>
      <div class="crow">
        <span class="clbl" id="cr-dev">Developer</span>
        <span class="cname">@Raj_op_360</span>
      </div>
      <div class="crow">
        <span class="clbl" id="cr-des">Design Help</span>
        <span class="cname">@Nabinnayak</span>
      </div>
      <div class="csep"></div>
      <div class="cmade" id="cr-made">
        Built for the FreeFire community 🔥<br/>
        No login required · Free · Open data
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const INFO  = 'https://info.killersharmabot.online';
const IMAGE = 'https://image.killersharmabot.online';
const ICONS = 'https://raw.githubusercontent.com/I-SHOW-AKIRU200/AKIRU-ICONS/main/ICONS';
const ITEMDATA_URL = 'https://raw.githubusercontent.com/starexxx/FFItems/74c2af66d691776c2452bd72ca0388ba52d7c5fb/assets/itemData.json';

let mode = 'uid', lang = 'en';
let itemDB = null; // loaded lazily

/* ══ ITEM DATABASE ══ */
async function getItemDB() {
  if (itemDB) return itemDB;
  try {
    const r = await fetch(ITEMDATA_URL);
    const data = await r.json();
    itemDB = {};
    data.forEach(item => {
      itemDB[item.itemID] = {
        name: item.description || ('Item #' + item.itemID),
        icon: item.icon || '',
        rare: item.Rare || 'WHITE',
        type: item.itemType || '',
        ctype: item.collectionType || '',
        desc2: item.description2 || ''
      };
    });
    return itemDB;
  } catch (e) {
    console.warn('ItemDB load failed:', e);
    itemDB = {};
    return itemDB;
  }
}

function itemImg(id) {
  return `${ICONS}/${id}.png`;
}
function itemName(db, id) {
  return (db[id] && db[id].name) ? db[id].name : ('Item #' + id);
}
function itemRare(db, id) {
  return (db[id] && db[id].rare) ? db[id].rare : 'WHITE';
}

/* ══ RANK SYSTEMS ══ */
// BR Rank — points based
function brRankName(pts) {
  if (!pts || pts <= 0) return 'Unranked';
  if (pts >= 4200) {
    // Heroic sub-tiers: I=4200-4299, II=4300-4399, III=4400-4499, IV=4500-4599, V=4600+
    const sub = Math.floor((pts - 4200) / 100);
    const roman = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
    return 'Heroic ' + (roman[sub] || (sub+1).toString());
  }
  if (pts >= 4100) return 'Heroic';
  if (pts >= 3800) return 'Diamond III';
  if (pts >= 3400) return 'Diamond II';
  if (pts >= 3000) return 'Diamond I';
  if (pts >= 2600) return 'Platinum III';
  if (pts >= 2200) return 'Platinum II';
  if (pts >= 1900) return 'Platinum I';
  if (pts >= 1600) return 'Gold III';
  if (pts >= 1300) return 'Gold II';
  if (pts >= 1000) return 'Gold I';
  if (pts >= 800)  return 'Silver III';
  if (pts >= 600)  return 'Silver II';
  if (pts >= 400)  return 'Silver I';
  if (pts >= 300)  return 'Bronze III';
  if (pts >= 200)  return 'Bronze II';
  if (pts >= 100)  return 'Bronze I';
  return 'Unranked';
}
function brRankClass(pts) {
  if (pts >= 4100) return 'gold';
  if (pts >= 3000) return 'blu';
  if (pts >= 1900) return 'teal';
  if (pts >= 1000) return 'amb';
  return '';
}

// CS Rank — STAR based (csRankingPoints = star count)
// "Elite Heroic" is top-server tier; normal Heroic = 36+ stars in FF CS
const CS_TIERS = [
  {min:0,  max:2,  name:'Bronze I'},
  {min:3,  max:5,  name:'Bronze II'},
  {min:6,  max:8,  name:'Bronze III'},
  {min:9,  max:12, name:'Silver I'},
  {min:13, max:16, name:'Silver II'},
  {min:17, max:20, name:'Silver III'},
  {min:21, max:25, name:'Gold I'},
  {min:26, max:30, name:'Gold II'},
  {min:31, max:35, name:'Gold III'},
  {min:36, max:999, name:'Heroic'},  // 36+ stars = Heroic in CS
];
function csRankName(stars, pts) {
  // If pts and stars differ significantly, pts might indicate Elite tier
  // Elite Heroic is top-server rank, usually shown when pts is very high
  if (!stars && stars !== 0) return '—';
  if (stars <= 0 && (!pts || pts <= 0)) return 'Unranked';
  // Check if elite tier based on points (pts = actual ranking points, stars = star count)
  if (pts && pts > 1000) {
    // Very high points = elite tier
    const starDisp = stars || pts;
    if (pts > 5000) return `Elite Heroic (${starDisp} Star)`;
    if (pts > 2000) return `Elite (${starDisp} Star)`;
  }
  // Normal star-based tier
  const s = stars || 0;
  if (s >= 36) return `Heroic (${s} Star)`;
  for (let i = CS_TIERS.length - 2; i >= 0; i--) {
    const tier = CS_TIERS[i];
    if (s >= tier.min) {
      const pos = s - tier.min + 1;
      const total = tier.max - tier.min + 1;
      return `${tier.name} (${pos}/${total} ⭐)`;
    }
  }
  return `${s} Star`;
}
function csRankClass(stars) {
  if (stars >= 36) return 'gold';
  if (stars >= 21) return 'blu';
  if (stars >= 9)  return 'teal';
  return '';
}

/* ══ SKILLS FORMATTER ══ */
function formatSkills(slots) {
  // skillSetSlot: array of {skillId, passiveSkillId} or {charId, ...}
  // OR profileInfo.skills: array of objects
  // We extract unique character names
  if (!slots || !slots.length) return '—';
  const seen = new Set();
  const out = [];
  for (const s of slots) {
    if (typeof s === 'object' && s !== null) {
      const ids = [s.skillId, s.charId, s.id, s.character_id].filter(Boolean);
      for (const id of ids) {
        const n = charName(id);
        if (!seen.has(n) && !n.startsWith('Char#')) {
          seen.add(n);
          const passive = s.passive === true || s.type === 2 || s.skillType === 'passive';
          out.push(n + (passive ? ' (Passive)' : ' (Active)'));
        }
      }
    } else if (s) {
      const n = charName(s);
      if (!seen.has(n)) { seen.add(n); out.push(n); }
    }
  }
  return out.length ? out.join(', ') : (slots.length + ' skills');
}

    <div class="card">
      <div class="imgf banner">
        <img src="${bannerURL}" alt="Banner" loading="lazy"
          onerror="this.outerHTML='<div class=\\'img-err\\'>Unavailable</div>'"/>
      </div>
    </div>`;

    /* ── OUTFIT IMAGE ── */
    H += `
    <div class="slbl">${t('outfit')}</div>
    <div class="card">
      <div class="imgf outfit">
        <img src="${outfitURL}" alt="Outfit" loading="lazy"
          onerror="this.outerHTML='<div class=\\'img-err\\'>Unavailable</div>'"/>
      </div>
    </div>`;

    /* ── BAN STATUS ── */
    if (banData) {
      const bS = banData.banStatus || {};
      const isBanned = bS.isProcessed === true || bS.isBanned === true || bS.status === 1;
      H += `
      <div class="slbl">${t('ban')}</div>
      <div class="card">
        <div class="banw">
          <div class="banic ${isBanned ? 'bad' : 'safe'}">${isBanned ? '🚫' : '✅'}</div>
          <div>
            <div class="bantitle" style="color:${isBanned ? 'var(--red)' : 'var(--green)'}">
              ${isBanned ? t('banned_') : t('clean')}
            </div>
            <div class="bansub">${isBanned ? t('banned_s') : t('clean_s')}</div>
            ${bS.banPeriod ? `<div style="font-size:11px;color:var(--red);margin-top:4px">Period: ${bS.banPeriod}</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    /* ── WISHLIST ── */
    const wishRaw = wishData?.wishlist || wishData?.data?.wishlist || [];
    const wishes = wishRaw.map(item => {
      if (typeof item === 'object' && item !== null) {
        return { id: item.itemId || item.id || item.item_id || 0,
                 name: item.itemName || item.name || '' };
      }
      return { id: Number(item), name: '' };
    }).filter(x => x.id);

    H += `
    <div class="slbl">${t('wish')}${wishes.length ? ' · ' + wishes.length + ' items' : ''}</div>
    <div class="card">
      ${wishes.length
        ? `<div class="igrid">${wishes.map(w =>
            itemCard(w.id, db, w.name || db[w.id]?.name || '')
          ).join('')}</div>`
        : `<div class="empty-msg">Wishlist is empty</div>`
      }
    </div>`;

    /* ── GUILD LEADER ── */
    if (leaderData) {
      const li = leaderData.basicInfo   || {};
      const lc = leaderData.clanBasicInfo || {};
      const lp = leaderData.profileInfo || {};
      const lw = li.weaponSkinShows     || [];
      const lcl= lp.clothes             || [];
      const lPrime = (li.primeLevel || {}).level || li.primeLevel || 0;
      const lFrame = lPrime === 8 ? 'true' : 'false';
      const lSafeName = encodeURIComponent(li.nickname || '');
      const lSafeClan = encodeURIComponent(lc.clanName || '');
      const lAvId = lp.avatarId || '102000007';
      const lOutfit = `${IMAGE}/outfit-image?avatar_id=${lAvId}&clothes=${[...lcl,...lw].join(',')}`;
      const lBanner = `${IMAGE}/banner-image?headPic=${li.headPic||''}&bannerId=${li.bannerId||''}&name=${lSafeName}&level=${li.level||0}&guild=${lSafeClan}&pinId=${li.pinId||'900000012'}&celebrity=${li.celebrityStatus||0}&primeLevel=${lPrime}&frame=${lFrame}`;
      const lBrPts  = li.rankingPoints || li.brRankingPoints || 0;
      const lCsS    = li.csRankingPoints || li.csRank || 0;
      const lCsP    = li.csPoints || 0;
      const lBooyah = booyahStr(li.booyahPassStatus || li.booyahPass);
      const lOB     = obVer(li.releaseVersion || li.mostRecentOBVersion);
      const lBP     = li.currentBPBadges || li.bpBadges || li.badgeCnt || 0;

      H += `
      <div class="slbl">${t('leader')}</div>
      <div class="card">
        <div class="prow" style="padding-top:14px;">
          <div class="avawrap" style="margin-top:0;">
            <img class="ava" src="${lOutfit}" alt="leader" loading="lazy"
              onerror="this.outerHTML='<div class=\\'ava-ph\\'>👑</div>'"/>
          </div>
          <div class="pcol">
            <div class="pname">${esc(li.nickname || '—')}</div>
            <div class="puid">UID: ${li.accountId || '—'} · ${li.region || '—'}</div>
            <div class="ptags">
              <span class="tag tf">⭐ Lv.${li.level || '—'}</span>
              ${lPrime ? `<span class="tag tg">👑 Prime ${lPrime}</span>` : ''}
              ${lBrPts ? `<span class="tag tb">🏆 ${brRankName(lBrPts)}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="il" style="border-top:1px solid var(--sep);">
          ${row('🆔','Leader UID',li.accountId,'mono')}
          ${row('⭐','Level',`${li.level||'—'} (Exp: ${fmtNum(li.exp||0)})`)}
          ${row('🌍','Region',li.region||'—')}
          ${row('🎫','Booyah Pass',lBooyah, lBooyah !== 'None' ? 'gold' : '')}
          ${lOB !== '—' ? row('🔄','Most Recent OB',lOB) : ''}
          ${row('🏆','BR Rank',lBrPts ? `${brRankName(lBrPts)} (${lBrPts})` : 'Unranked', brRankClass(lBrPts))}
          ${row('🎯','CS Rank',lCsS ? `${csRankName(lCsS,lCsP)} (${lCsS} Star)` : 'Unranked', csRankClass(lCsS))}
          ${lBP ? row('🥇','Current BP Badges',lBP) : ''}
          ${row('🏷️','Title',li.titleName || '—')}
          ${li.lastLoginAt ? row('🕐','Last Login',fmtIST(li.lastLoginAt)) : ''}
          ${li.createAt    ? row('📅','Created At',fmtIST(li.createAt))    : ''}
        </div>
        <div style="padding:4px 12px 12px;">
          <div class="ch" style="border-top:none;padding-left:2px;">Leader Banner</div>
          <div class="imgf banner">
            <img src="${lBanner}" alt="Leader Banner" loading="lazy"
              onerror="this.outerHTML='<div class=\\'img-err\\'>Unavailable</div>'"/>
          </div>
        </div>
      </div>`;
    }

    setOut(H);

  } catch (e) {
    console.error(e);
    showErr(t('err'));
  } finally {
    showLoader(false);
    document.getElementById('gb').disabled = false;
  }
}
</script>
</body>
</html>
